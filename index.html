<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N0<AT - Config Automation Tool</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐈‍⬛</text></svg>">
    <style>
        /* --- CORE CSS VARIABLES --- */
        /* These are overridden by themes. Default is Dark Mode. */
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --btn-text: #fff; /* Key for light themes */
            --accent-blue: #58a6ff;
            --accent-green: #238636;
            --neon-green: #39ff14;
            --accent-purple: #bc8cff;
            --accent-red: #f85149;
            --hl-orange: #ff9d00;
            --hl-yellow: #e3b341;
            --hl-cyan: #00ffff;
            --code-bg: #010409;

            /* Syntax coloring for original switch output (README left side) */
            --syntax-out-comment: #484f58;
            --syntax-out-vlan: #00ffff;
            --syntax-out-command: #fff;
            --syntax-out-mode: #ff0;
            --syntax-out-edge: #f0f;
            --syntax-out-if: #fff;
        }

        /* --- THEME: FABULOUS NEKO (Cloud Palette) --- */
        /* Incorporates Deep Purple, Fuchsia, Rose, Periwinkle, and Sky Blue */
        [data-theme="fab-neko"] {
            --bg-color: #f1f4f8; /* Very Light Periwinkle-Sky, Swatch P4/P5 tint */
            --card-bg: #ffffff;
            --border-color: #c084cf; /* Subtle Fuchsia-Lilac, Swatch P2 tint */
            --text-main: #512b58; /* Deep Purple, Swatch P1 */
            --btn-text: #512b58;
            --accent-blue: #a3d9ff; /* Swatch P5 (Sky Blue) tint */
            --accent-green: #ff69b4; /* Fuchsia/Rose (Swatch P2/P3), the new interactive button color */
            --neon-green: #f062f0; /* Vibrant Fuchsia (Swatch P2) indicator color */
            --accent-purple: #9b5fb5; /* Swatch P1 (Purple) */
            --accent-red: #da5560; /* Deep Palette-shifting Rose Red */
            --hl-orange: #f8a6c8; /* Palette Rose P3 */
            --hl-yellow: #f0a0f0; /* Palette Fuchsia P2 */
            --hl-cyan: #d6eaff; /* Palette Sky Blue P5 tint */
            --code-bg: #eef1f8; /* Swatch P4 Light Periwinkle tint */

            /* Syntax for Fab Neko (light background) */
            --syntax-out-comment: #8b6b8b; /* Lilac-grey (P1 shifted) */
            --syntax-out-vlan: #5fb4e0; /* Palette Sky Blue P5 */
            --syntax-out-command: #512b58; /* Dark Purple P1 */
            --syntax-out-mode: #e060e0; /* Palette Fuchsia P2 */
            --syntax-out-edge: #f17df1; /* Palette Rose P3 */
            --syntax-out-if: #512b58;
        }

        /* Update Syntax highlighting based on themes */
        .sample-code div { color: var(--syntax-out-command); }
        .sample-code span[style*="color: #ff9d00;"] { color: var(--accent-orange) !important; } /* original orange */
        .sample-code span[style*="color: #00ffff;"] { color: var(--syntax-out-vlan) !important; } /* original cyan */
        .sample-code span[style*="color: #ffff00;"] { color: var(--syntax-out-mode) !important; } /* original yellow */
        .sample-code span[style*="color: #ff00ff;"] { color: var(--syntax-out-edge) !important; } /* original magenta */
        .sample-code strong { color: var(--text-main); }
        .sample-code code { color: var(--text-main); }
        
        body {
            font-family: "Segoe UI", Roboto, monospace;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: scroll; /* Permanently reserves scrollbar space to prevent UI shifting */
        }

        /* --- DYNAMIC BACKGROUND CANVAS --- */
        #networkBg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none; 
        }

        .container { 
            max-width: 1050px; 
            width: 100%; 
            position: relative; 
            z-index: 1; 
        }

        /* --- HEADER ROW (MENU, LOGO & TIMEZONE) --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            gap: 20px;
        }

        h2 {
            color: #ffffff;
            font-size: 1.7rem;
            margin: 0;
            display: flex;
            align-items: baseline;
            gap: 12px;
            font-family: "Courier New", Courier, monospace;
            font-weight: bold;
            flex-grow: 1;
        }
        
        /* Apply palette purple to logo in Fab Neko theme */
        [data-theme="fab-neko"] h2 { color: var(--accent-purple); }

        .logo-text {
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .logo-accent {
            background-color: var(--neon-green);
            color: var(--code-bg);
            padding: 0px 6px;
            margin: 0 6px;
            box-shadow: 0 0 12px rgba(57, 255, 20, 0.4);
            display: inline-block;
            font-weight: 900;
        }
        
        [data-theme="fab-neko"] .logo-accent {
            box-shadow: 0 0 12px rgba(240, 98, 240, 0.6);
        }

        .version-tag {
            font-size: 0.8rem;
            color: var(--accent-blue);
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: normal;
            font-family: "Segoe UI", Roboto, monospace;
        }
        
        /* --- QUALITY_OF_LIFE MENU (GEAR ICON) --- */
        .qol-menu {
            position: relative;
            display: inline-block;
            align-self: flex-start;
        }
        
        .qol-menu-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s ease;
            box-sizing: border-box;
            line-height: 1;
        }
        
        .qol-menu-btn:hover {
            border-color: var(--accent-purple);
            background: rgba(188, 140, 255, 0.1);
            box-shadow: 0 0 12px rgba(188, 140, 255, 0.4);
        }
        
        [data-theme="fab-neko"] .qol-menu-btn:hover {
            box-shadow: 0 0 12px rgba(240, 98, 240, 0.6);
        }

        .qol-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            min-width: 180px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            z-index: 100;
            overflow: hidden;
            backdrop-filter: blur(4px);
        }
        
        .qol-dropdown-content button {
            display: block;
            width: 100%;
            background: transparent;
            color: var(--text-main);
            padding: 12px 16px;
            border: none;
            text-align: left;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            font-family: "Segoe UI", Roboto, monospace;
        }
        
        .qol-dropdown-content button:hover {
            background: rgba(188, 140, 255, 0.1);
            color: var(--accent-purple);
        }
        
        .qol-dropdown-content button.active {
            font-weight: bold;
            color: var(--accent-green);
        }
        
        [data-theme="fab-neko"] .qol-dropdown-content button:hover {
            background: rgba(240, 98, 240, 0.15);
            color: var(--neon-green);
        }
        
        .qol-menu:hover .qol-dropdown-content { display: block; }
        
        /* Timezone WIDGET (already integrated) */
        .tz-widget {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: "Courier New", Courier, monospace;
            font-size: 11px;
            color: var(--text-main);
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            white-space: nowrap; 
        }
        
        [data-theme="fab-neko"] .tz-widget {
            background: rgba(241, 244, 248, 0.85);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-green);
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
        }
        .live-dot.pulse {
            box-shadow: 0 0 8px var(--neon-green);
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        .live-dot.paused {
            background-color: var(--hl-orange);
            box-shadow: 0 0 8px var(--hl-orange);
            animation: none;
        }

        .tz-time-input {
            background: transparent;
            color: var(--text-main);
            border: none;
            font-family: "Courier New", Courier, monospace;
            font-size: 11px;
            outline: none;
            cursor: text;
            width: 95px; 
            padding: 0;
            text-align: center;
            transition: color 0.2s;
        }
        .tz-time-input::-webkit-calendar-picker-indicator { display: none; }
        .tz-time-input:focus { 
            color: #fff; 
            border-bottom: 1px solid var(--accent-blue); 
            margin-bottom: -1px;
        }
        
        [data-theme="fab-neko"] .tz-time-input:focus { color: var(--text-main); }

        .tz-select {
            background: transparent;
            color: var(--neon-green);
            border: none;
            font-family: "Courier New", Courier, monospace;
            font-size: 11px;
            cursor: pointer;
            outline: none;
            font-weight: bold;
            appearance: none;
            -webkit-appearance: none;
            padding-right: 4px;
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.4);
        }
        
        [data-theme="fab-neko"] .tz-select {
            text-shadow: 0 0 5px rgba(240, 98, 240, 0.6);
        }

        .tz-select.source-tz {
            color: var(--text-main);
            text-shadow: none;
        }

        .tz-select option {
            background: var(--card-bg);
            color: var(--neon-green);
            text-shadow: none;
        }
        
        .tz-select.source-tz option {
            color: var(--text-main);
        }

        .tz-select:hover { text-decoration: underline; }

        #convertedTimeDisplay {
            white-space: nowrap;
            min-width: 65px;
        }

        .fmt-toggle {
            background: transparent;
            color: var(--neon-green);
            border: 1px solid var(--accent-green);
            padding: 2px 6px;
            font-size: 9px;
            cursor: pointer;
            border-radius: 3px;
            transition: 0.2s;
            font-family: "Courier New", Courier, monospace;
            margin-right: 6px;
            white-space: nowrap; 
            flex-shrink: 0; 
        }
        
        .fmt-toggle:hover {
            background: rgba(57, 255, 20, 0.1);
        }
        
        [data-theme="fab-neko"] .fmt-toggle:hover {
            background: rgba(240, 98, 240, 0.2);
        }

        /* Form Group (Card background) */
        .form-group {
            background: rgba(22, 27, 34, 0.85); 
            backdrop-filter: blur(4px); 
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        
        [data-theme="fab-neko"] .form-group {
            background: rgba(255, 255, 255, 0.85);
        }

        .input-section { margin-bottom: 15px; position: relative; }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: var(--accent-blue);
            font-size: 0.75rem;
            text-transform: uppercase;
            opacity: 0.8;
        }
        
        .header-row label { margin-bottom: 0; }

        .expand-btn {
            background: transparent;
            color: var(--accent-purple);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            font-size: 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s ease;
            font-family: "Courier New", Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .expand-btn:hover {
            border-color: var(--accent-purple);
            background: rgba(188, 140, 255, 0.1);
            box-shadow: 0 0 8px rgba(188, 140, 255, 0.3);
            color: #fff;
        }
        
        [data-theme="fab-neko"] .expand-btn:hover {
            box-shadow: 0 0 12px rgba(155, 95, 181, 0.6);
        }

        /* --- COLLAPSIBLE WRAPPERS --- */
        .readme-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), padding 0.3s, margin 0.3s, border 0.3s;
        }

        .readme-wrapper.expanded {
            max-height: 1500px;
            padding-top: 15px;
            margin-top: 10px;
            border-top: 1px dashed rgba(188, 140, 255, 0.4);
        }
        
        #advOptionsWrapper.expanded {
            max-height: 2500px; 
            border-top-color: rgba(227, 179, 65, 0.4);
        }

        .readme-content {
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-main);
            opacity: 0.9;
        }

        .readme-content h3 {
            color: var(--accent-purple);
            font-size: 12px;
            margin: 12px 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .readme-content p { margin: 0 0 10px 0; }
        .readme-content ul { margin: 5px 0 15px 0; padding-left: 20px; }
        .readme-content li { margin-bottom: 6px; }

        .sample-code {
            background: var(--code-bg);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 4px;
            font-family: "Courier New", Courier, monospace;
            color: var(--text-main);
            white-space: normal; 
            margin-bottom: 15px;
            font-size: 11.5px;
            line-height: 1.4;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            gap: 20px;
        }

        /* Textarea Drag Drop overlay */
        .drag-overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--neon-green);
            font-family: "Courier New", Courier, monospace;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none;
            opacity: 0;
            transition: 0.2s;
            text-shadow: 0 0 8px rgba(57, 255, 20, 0.5);
        }
        textarea.drag-active + .drag-overlay-text { opacity: 1; }
        
        [data-theme="fab-neko"] .drag-overlay-text {
            text-shadow: 0 0 12px rgba(240, 98, 240, 0.6);
        }

        /* --- CLEAN NATIVE TEXTAREA --- */
        textarea {
            width: 100%;
            height: 120px;
            background: rgba(1, 4, 9, 0.9);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 12px;
            font-family: "Courier New", Courier, monospace;
            box-sizing: border-box;
            outline: none;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            transition: height 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), border-color 0.2s, box-shadow 0.2s;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) var(--code-bg);
        }
        
        textarea:focus { border-color: var(--accent-blue); }
        textarea.expanded { height: 400px; }
        
        textarea.drag-active {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.2) inset;
            background: rgba(9, 26, 15, 0.2);
        }
        
        [data-theme="fab-neko"] textarea {
            background: rgba(255, 255, 255, 0.9);
            color: var(--text-main);
            scrollbar-color: var(--border-color) var(--code-bg);
        }
        
        [data-theme="fab-neko"] textarea.drag-active {
            box-shadow: 0 0 15px rgba(240, 98, 240, 0.2) inset;
            background: rgba(240, 98, 240, 0.1);
        }
        
        textarea::-webkit-scrollbar { width: 10px; }
        textarea::-webkit-scrollbar-track { background: var(--code-bg); }
        textarea::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        textarea::selection { background: rgba(88, 166, 255, 0.3); }

        /* --- Device HUD --- */
        .device-hud {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 6px;
            font-size: 11px;
            color: var(--text-main);
            font-family: "Courier New", Courier, monospace;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 500px;
        }
        .device-hud.visible { opacity: 1; }
        .host-tag {
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.3);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
        }
        .host-tag strong { color: var(--btn-text); margin-right: 5px; }
        
        [data-theme="fab-neko"] .host-tag strong { color: #fff; }

        .ip-highlight { font-weight: bold; text-shadow: 0 0 5px rgba(57, 255, 20, 0.4); }
        
        [data-theme="fab-neko"] .ip-highlight { text-shadow: 0 0 5px rgba(240, 98, 240, 0.6); }

        /* --- Perfect Alignment UI Controls --- */
        .controls-row { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 15px; 
            margin-top: 15px; 
            align-items: stretch; 
            flex-wrap: wrap; 
        }

        .controls-row .form-group {
            margin-bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .radio-group, .checkbox-group { display: flex; gap: 6px; width: 100%; }
        .radio-group label, .checkbox-group label {
            background: rgba(13, 17, 23, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-bottom: 0;
            transition: 0.2s;
            display: inline-block;
            text-align: center;
            flex-grow: 1;
            box-sizing: border-box;
        }
        
        [data-theme="fab-neko"] .radio-group label, [data-theme="fab-neko"] .checkbox-group label {
            background: rgba(255, 255, 255, 0.8);
        }

        .radio-group input, .checkbox-group input { display: none; }
        .radio-group label:has(input:checked), .checkbox-group label:has(input:checked) { 
            border-color: var(--neon-green); 
            color: var(--neon-green);
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.2);
        }
        
        [data-theme="fab-neko"] .radio-group label:has(input:checked), [data-theme="fab-neko"] .checkbox-group label:has(input:checked) {
            border-color: var(--accent-green);
            color: var(--btn-text);
            background-color: var(--accent-green);
            box-shadow: 0 0 12px rgba(240, 98, 240, 0.6);
        }
        
        [data-theme="fab-neko"] .radio-group label:has(input:checked) span, [data-theme="fab-neko"] .checkbox-group label:has(input:checked) span {
            color: #fff;
        }

        .radio-group label.disabled, .checkbox-group label.disabled {
            opacity: 0.3 !important;
            cursor: not-allowed !important;
            background: var(--bg-color) !important;
            border-color: var(--border-color) !important;
            color: var(--border-color) !important;
            box-shadow: none !important;
        }

        /* Glitch Danger Mode */
        @keyframes danger-glitch {
            0% { box-shadow: 0 0 5px rgba(248, 81, 73, 0.5); transform: skewX(0deg); text-shadow: none; }
            2% { box-shadow: 0 0 20px rgba(248, 81, 73, 1); transform: skewX(5deg) translate(-2px, 1px); text-shadow: 2px 0 var(--accent-red), -2px 0 var(--accent-blue); }
            4% { box-shadow: 0 0 5px rgba(248, 81, 73, 0.5); transform: skewX(-5deg) translate(2px, -1px); text-shadow: -2px 0 var(--accent-red), 2px 0 var(--accent-blue); }
            6% { transform: skewX(0deg) translate(0, 0); text-shadow: none; }
            50% { box-shadow: 0 0 15px rgba(248, 81, 73, 0.8); }
            94% { transform: skewX(0deg) translate(0, 0); text-shadow: none; }
            96% { box-shadow: 0 0 25px rgba(248, 81, 73, 1); transform: skewX(8deg) translate(3px, 0); text-shadow: 3px 0 var(--accent-red), -3px 0 var(--accent-blue); }
            98% { box-shadow: 0 0 5px rgba(248, 81, 73, 0.5); transform: skewX(-8deg) translate(-3px, 0); text-shadow: -3px 0 var(--accent-red), 3px 0 var(--accent-blue); }
            100% { box-shadow: 0 0 5px rgba(248, 81, 73, 0.5); transform: skewX(0deg) translate(0, 0); text-shadow: none; }
        }

        .radio-group label:has(input[value="remove"]:checked) {
            border-color: var(--accent-red) !important;
            color: #ff7b72 !important;
            background: rgba(248, 81, 73, 0.1) !important;
            animation: danger-glitch 3s infinite !important;
        }
        
        [data-theme="fab-neko"] .radio-group label:has(input[value="remove"]:checked) {
            color: #fff !important;
            background: rgba(248, 81, 73, 1) !important;
        }

        input[type="number"] {
            background: rgba(1, 4, 9, 0.8);
            border: 1px solid var(--border-color);
            color: #d29922;
            padding: 6px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            font-family: "Courier New", Courier, monospace;
            text-align: center;
            height: 31px; 
        }
        
        [data-theme="fab-neko"] input[type="number"] {
            background: rgba(255, 255, 255, 0.8);
            color: var(--accent-green);
        }

        /* --- Per-Port Override Table --- */
        .override-table th {
            background: rgba(13, 17, 23, 0.95);
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            color: var(--accent-blue);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        [data-theme="fab-neko"] .override-table th {
            background: rgba(255, 255, 255, 0.95);
        }

        .override-input {
            background: rgba(1, 4, 9, 0.8);
            border: 1px dashed rgba(88, 166, 255, 0.5);
            color: var(--neon-green);
            padding: 4px 6px;
            border-radius: 3px;
            width: 60px;
            font-family: monospace;
            outline: none;
            transition: 0.2s;
            height: auto;
        }
        
        [data-theme="fab-neko"] .override-input {
            background: rgba(255, 255, 255, 0.8);
            color: var(--btn-text);
            border: 1px solid var(--border-color);
        }

        .override-select.danger-mode {
            border-color: var(--accent-red) !important;
            color: #ff7b72 !important;
            background: rgba(248, 81, 73, 0.3) !important;
            animation: danger-glitch 3s infinite !important;
        }
        
        [data-theme="fab-neko"] .override-select.danger-mode {
            color: #fff !important;
            background: rgba(248, 81, 73, 1) !important;
        }

        /* --- Action Bar --- */
        .action-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            margin-bottom: 25px;
            padding-top: 25px;
            border-top: 1px dashed rgba(88, 166, 255, 0.2);
        }

        @keyframes pulse-ready {
            0% { box-shadow: 0 0 5px rgba(57, 255, 20, 0.3); }
            50% { box-shadow: 0 0 20px rgba(57, 255, 20, 0.8); }
            100% { box-shadow: 0 0 5px rgba(57, 255, 20, 0.3); }
        }

        .cyber-btn {
            background: var(--accent-green);
            color: #fff;
            padding: 12px 50px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid var(--neon-green);
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .cyber-btn.ready {
            animation: pulse-ready 2s infinite;
        }

        .cyber-btn:not(:disabled):hover { 
            background: #2ea043; 
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.9); 
        }

        [data-theme="fab-neko"] .cyber-btn {
            border: 1px solid var(--border-color);
        }
        
        [data-theme="fab-neko"] .cyber-btn.ready {
            box-shadow: 0 0 12px rgba(240, 98, 240, 0.6);
            animation: none; /* User preferred standard glow over pulse for this ready state */
        }
        
        [data-theme="fab-neko"] .cyber-btn:not(:disabled):hover {
            background: var(--text-main);
            color: #fff;
        }

        .clear-btn:hover {
            opacity: 1;
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            background: rgba(188, 140, 255, 0.1);
            box-shadow: 0 0 10px rgba(188, 140, 255, 0.2);
        }
        
        [data-theme="fab-neko"] .clear-btn:hover {
            background: rgba(155, 95, 181, 0.15);
            box-shadow: 0 0 12px rgba(155, 95, 181, 0.6);
        }

        /* Glitch Conflict text-shadow */
        .conflict-section strong {
            color: var(--hl-magenta) !important;
            text-shadow: 0 0 5px rgba(255, 0, 255, 0.4);
        }
        
        [data-theme="fab-neko"] .conflict-section strong {
            color: var(--accent-red) !important;
            text-shadow: 0 0 5px rgba(248, 81, 73, 0.6);
        }
        
        /* Tooltip Palette Colors */
        .tooltip-icon { color: var(--accent-blue); background: rgba(88, 166, 255, 0.1); border: 1px solid var(--accent-blue); }
        .tooltip-icon::after { background: var(--card-bg); border: 1px solid var(--accent-blue); color: var(--text-main); }

        /* DB Note Palette Colors */
        .db-security-note { background: rgba(35, 134, 54, 0.1); border-left: 3px solid var(--accent-green); color: var(--text-main); }
        .db-status { color: var(--accent-green); }

    </style>
</head>
<body>

<canvas id="networkBg"></canvas>

<div class="container">
    
    <div class="top-bar">
        <div class="qol-menu">
            <button class="qol-menu-btn" title="Quality of Life Settings">⚙️</button>
            <div class="qol-dropdown-content" id="qolDropdown">
                <button onclick="changeTheme('dark')" id="theme-dark" class="active">Theme: Dark (Default)</button>
                <button onclick="changeTheme('fab-neko')" id="theme-fab-neko">Theme: Fabulous Neko 🐈‍⬛</button>
                <button onclick="changeTimeFormat(12)">Time: 12H Format</button>
                <button onclick="changeTimeFormat(24)">Time: 24H Format</button>
            </div>
        </div>

        <h2>
            <span class="logo-text">N0C<span class="logo-accent">&lt;</span>AT</span>
            <span class="version-tag">// Configuration Automation Tool // v8.5 Range Matrix</span>
        </h2>
        
        <div class="tz-widget">
            <button id="fmtToggleBtn" class="fmt-toggle" onclick="toggleTimeFormat()" title="Toggle 12H / 24H Format">[ 24H ]</button>
            <div id="liveIndicator" class="live-dot pulse" onclick="resetToLiveTime()" title="LIVE CLOCK (Click to resume)"></div>
            
            <select id="sourceTzSelector" class="tz-select source-tz" onchange="updateClocks()">
                <option value="Local">LOCAL</option>
                <option value="UTC">UTC</option>
                <option value="America/New_York">EST</option>
                <option value="America/Los_Angeles">PST</option>
                <option value="Europe/London">GMT</option>
                <option value="Europe/Berlin">CET</option>
                <option value="Asia/Kolkata">IST</option>
                <option value="Asia/Manila">PHT</option>
                <option value="Australia/Sydney">AEST</option>
            </select>
            
            <span style="opacity: 0.5; margin: 0 2px;">></span>
            <input type="text" id="localTimeInput" class="tz-time-input" maxlength="11" autocomplete="off" onfocus="setCustomTime()" oninput="updateClocks()">
            <span style="opacity: 0.3; margin: 0 4px;">|</span>
            
            <select id="tzSelector" class="tz-select" onchange="updateClocks()">
                <option value="UTC">UTC</option>
                <option value="Local">LOCAL</option>
                <option value="America/New_York">EST</option>
                <option value="America/Los_Angeles">PST</option>
                <option value="Europe/London">GMT</option>
                <option value="Europe/Berlin">CET</option>
                <option value="Asia/Kolkata">IST</option>
                <option value="Asia/Manila">PHT</option>
                <option value="Australia/Sydney">AEST</option>
            </select>
            <span id="convertedTimeDisplay" style="color: var(--neon-green);">00:00:00</span>
        </div>
    </div>
    
    </div>

<script>
    // --- THEME ENGINE ---
    function changeTheme(themeName) {
        document.documentElement.setAttribute('data-theme', themeName);
        localStorage.setItem('noccat_theme', themeName);
        updateActiveThemeInMenu(themeName);
        generateScript(); // Re-style syntax in output blocks
    }
    
    function updateActiveThemeInMenu(themeName) {
        document.getElementById('theme-dark').classList.remove('active');
        document.getElementById('theme-fab-neko').classList.remove('active');
        const activeBtn = document.getElementById('theme-' + themeName);
        if (activeBtn) activeBtn.classList.add('active');
    }
    
    // Additional Quality of Life option from menu
    function changeTimeFormat(hours) {
        is24Hour = (hours === 24);
        localStorage.setItem('noccat_tz_24h', is24Hour);
        document.getElementById('fmtToggleBtn').innerText = is24Hour ? "[ 24H ]" : "[ 12H ]";
        resetToLiveTime(); // Refresh clocks with new format
    }

    // (Original script logic continues...)
    let isLiveTime = true;
    let is24Hour = true;
    let forceRawAccess = true; 
    
    // Modified to call update ForceAccess and update Clocks
    function toggleTimeFormat() {
        is24Hour = !is24Hour;
        document.getElementById('fmtToggleBtn').innerText = is24Hour ? "[ 24H ]" : "[ 12H ]";
        localStorage.setItem('noccat_tz_24h', is24Hour); 
        resetToLiveTime();
    }

    // Original load function modified to load theme
    window.addEventListener('load', function() {
        // Load Theme from Cache
        const savedTheme = localStorage.getItem('noccat_theme');
        if (savedTheme) {
            changeTheme(savedTheme);
        } else {
            // Check for OS preference
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                // If user prefers light, offer Neko theme? Or stay dark for now.
                // changeTheme('fab-neko');
            }
        }
        
        // Load Timezone Caches
        const savedSrcTz = localStorage.getItem('noccat_tz_src');
        if (savedSrcTz) document.getElementById('sourceTzSelector').value = savedSrcTz;
        
        const savedTgtTz = localStorage.getItem('noccat_tz_tgt');
        if (savedTgtTz) document.getElementById('tzSelector').value = savedTgtTz;

        const saved24h = localStorage.getItem('noccat_tz_24h');
        if (saved24h !== null) {
            is24Hour = saved24h === 'true';
            document.getElementById('fmtToggleBtn').innerText = is24Hour ? "[ 24H ]" : "[ 12H ]";
        }
        
        updateClocks();
        setInterval(updateClocks, 1000);
        
        // (Original switch db, drag drop, canvas init continua...)
    });

</script>
</body>
</html>
